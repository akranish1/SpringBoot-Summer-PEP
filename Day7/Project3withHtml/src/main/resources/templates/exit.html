<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Application Exited</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8fafc; margin: 0; }
        .thank-you-card { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 500px; border: 1px solid #e2e8f0; }
        h1 { color: #0f172a; margin-bottom: 10px; font-weight: 700; }
        p { color: #64748b; font-size: 16px; margin-bottom: 25px; line-height: 1.5; }
        .btn { display: inline-block; background: #4f46e5; color: white; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; transition: background 0.15s ease; }
        .btn:hover { background: #4338ca; }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <h1>Thank You!</h1>
        <p>Your session has ended successfully. Your changes and linked records are saved securely.</p>
        <a href="/employees/login" class="btn">Log Back In</a>
    </div>

</body>
</html>
