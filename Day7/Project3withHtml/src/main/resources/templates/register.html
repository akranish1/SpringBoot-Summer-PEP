<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR System | Register</title>
    <style>
        :root { --bg-color: #f8fafc; --primary: #4f46e5; --primary-hover: #4338ca; --border: #e2e8f0; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid var(--border); }
        h2 { margin-bottom: 8px; font-weight: 700; color: #0f172a; text-align: center; }
        p.subtitle { color: #64748b; font-size: 14px; text-align: center; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 14px; font-weight: 600; color: #334155; }
        input { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; width: 100%; }
        button:hover { background: var(--primary-hover); }
        .alert-danger { padding: 10px; border-radius: 6px; font-size: 14px; margin-bottom: 15px; font-weight: 500; text-align: center; background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
        .error-msg { color: var(--danger); font-size: 13px; font-weight: 500; margin-top: 2px; }
        .switch-link { text-align: center; margin-top: 20px; font-size: 14px; color: #64748b; }
        .switch-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">Register to manage your secure database segment</p>
        
        <div class="alert-danger" th:if="${registerError}" th:text="${registerError}"></div>

        <form th:action="@{/employees/register}" th:object="${user}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" required placeholder="Alphanumeric characters only" />
                <span class="error-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" required placeholder="At least 4 characters long" />
                <span class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>
            <button type="submit">Sign Up</button>
        </form>
        <div class="switch-link">
            Already have an account? <a th:href="@{/employees/login}">Login instead</a>
        </div>
    </div>
</body>
</html>
